# ─────────────────────────────────────────────────
#  Online Voting System — Application Configuration
# ─────────────────────────────────────────────────

# Server
server.port=8080

# ── H2 In-Memory Database (Development) ──────────
spring.datasource.url=jdbc:h2:mem:votingdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── MySQL (Production — uncomment & fill) ────────
# spring.datasource.url=jdbc:mysql://localhost:3306/votingdb?useSSL=true&serverTimezone=UTC
# spring.datasource.username=your_db_user
# spring.datasource.password=your_db_password
# spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
# For MySQL: spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# ── JWT Security ──────────────────────────────────
# IMPORTANT: Change this secret before deploying to production!
# Use at least 256-bit (32-char) random string.
app.jwt.secret=VotingSystemSuperSecretKey2024ChangeInProduction!
app.jwt.expiration-ms=86400000

# ── Admin Bootstrap ───────────────────────────────
# Default admin credentials (change on first login)
app.admin.username=admin
app.admin.password=Admin@123
app.admin.email=admin@voting.com

# ── Logging ───────────────────────────────────────
logging.level.com.voting=INFO
logging.level.org.springframework.security=WARN
